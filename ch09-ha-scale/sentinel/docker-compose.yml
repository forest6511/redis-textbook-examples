services:
  redis-master:
    image: redis:8-alpine  # Redis 8.8.0
    ports:
      - "6379:6379"
  redis-replica:
    image: redis:8-alpine
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master
  sentinel:
    image: redis:8-alpine
    # Sentinel モードで起動し、マスターを監視する
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      - redis-master
